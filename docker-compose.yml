# Запуск приложения и Nginx одной командой:  docker compose up -d --build
services:
  app:
    build: .
    container_name: shody_app
    restart: unless-stopped
    env_file: .env
    expose:
      - "8501"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./reports:/app/reports
      - ./backups:/app/backups
      - ./logs:/app/logs

  nginx:
    image: nginx:alpine
    container_name: shody_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # Для HTTPS раскомментируйте строку ниже и настройте сертификаты (см. DEPLOY_BEGET.md)
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
